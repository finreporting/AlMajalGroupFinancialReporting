*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh;display:flex}

/* Sidebar — auto-hide: collapsed by default, expands on hover */

.sb:hover,.sb.pinned{left:0}
.sb-logo{background:#fff;padding:14px 16px;border-bottom:3px solid #00B5B8;text-align:center}
.sb-logo h2{color:#1B3D6E;font-size:13.5px;font-weight:800;line-height:1.3}
.sb-logo span{font-size:9.5px;color:#64748b}
.ng{padding:14px 0 4px}
.ng-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#7FBCD2;padding:0 16px 6px;font-weight:600}
.ni{display:flex;align-items:center;gap:10px;padding:10px 16px;color:rgba(255,255,255,.7);font-size:12px;cursor:pointer;border-left:3px solid transparent;transition:all .2s}
.ni:hover{background:rgba(255,255,255,.08);color:#fff}
.ni.ac{border-left-color:#00B5B8;background:rgba(0,181,184,.15);color:#fff;font-weight:600}
.ni-ic{font-size:14px;width:18px;text-align:center}

/* Topbar */
.tb{position:sticky;top:0;z-index:50;background:#1B3D6E;color:#fff;padding:0 22px;height:46px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.tb .pt{font-size:13.5px;font-weight:700}
.tb-m{font-size:10.5px;color:#94a3b8}
.hb{display:inline-block;background:none;border:none;color:#fff;font-size:22px;cursor:pointer;margin-right:10px}

/* Main */
.mn{margin-left:55px;flex:1;display:flex;flex-direction:column;min-height:100vh;transition:margin-left .3s ease}
.sb:hover~.mn,.sb.pinned~.mn{margin-left:225px}
.pg{display:none;padding:16px 20px 36px}.pg.ac{display:block}
.ph{font-size:19px;font-weight:800;color:#1B3D6E;margin-bottom:3px}
.ps{font-size:11px;color:#64748b;border-left:3px solid #00B5B8;padding-left:10px;margin-bottom:14px}

/* Filter Bar */
.fb{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:10px 16px;margin-bottom:14px;display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.fg{display:flex;flex-direction:column;gap:2px}
.fg label{font-size:8.5px;text-transform:uppercase;letter-spacing:.5px;color:#64748b;font-weight:600}
.fg select,.fg input{padding:6px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;background:#fff;color:#1e293b;min-width:170px}
.fg select:focus,.fg input:focus{outline:none;border-color:#00B5B8;box-shadow:0 0 0 2px rgba(0,181,184,.2)}
.btn-r{padding:6px 14px;border:1px solid #e2e8f0;border-radius:6px;font-size:10.5px;font-weight:600;cursor:pointer;background:#f8fafc;color:#475569}.btn-r:hover{background:#e2e8f0}
.filter-tag{display:inline-block;padding:3px 10px;border-radius:10px;font-size:10px;font-weight:600;background:#e0f2fe;color:#0369a1;margin-left:8px}

/* KPI */
.kg{display:grid;grid-template-columns:repeat(auto-fill,minmax(172px,1fr));gap:10px;margin-bottom:16px}
.kp{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px;border-top:4px solid #1B3D6E;box-shadow:0 1px 3px rgba(0,0,0,.04);cursor:pointer;transition:all .2s}

.kp.g{border-top-color:#16a34a}.kp.r{border-top-color:#dc2626}.kp.a{border-top-color:#f59e0b}.kp.b{border-top-color:#00B5B8}.kp.dr{border-top-color:#9b2c2c}
.kl{font-size:9px;text-transform:uppercase;letter-spacing:.4px;color:#64748b;margin-bottom:2px}
.kv{font-size:18px;font-weight:800;color:#1e293b}
.kv.pos{color:#16a34a}.kv.neg{color:#dc2626}.kv.amb{color:#d97706}.kv.drc{color:#9b2c2c}
.ks{font-size:9px;color:#94a3b8;margin-top:1px}

/* Alert */
.al{background:#fef2f2;border:1px solid #fecaca;border-left:4px solid #dc2626;border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start}
.al-ic{font-size:20px;flex-shrink:0}
.al h4{font-size:12px;color:#991b1b;margin-bottom:3px}
.al p{font-size:11px;color:#7f1d1d;line-height:1.6}

/* Card */
.cd{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.04);margin-bottom:14px}
.ch{font-size:12.5px;font-weight:700;color:#1B3D6E;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}
.ch .dd{font-size:10px;color:#0369a1;cursor:pointer;border-bottom:2px dashed #0369a1;font-weight:600}
.ch .dd:hover{background:rgba(3,105,161,.05)}
.tc{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* Bars */
.br{display:flex;align-items:center;gap:6px;margin-bottom:5px;font-size:11px}
.bl{width:130px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#475569;flex-shrink:0;font-size:10.5px}
.bt{flex:1;height:20px;background:#f1f5f9;border-radius:4px;overflow:hidden}
.bf{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:5px;font-size:9px;color:#fff;font-weight:600;transition:width .6s ease;min-width:fit-content}
.bv{width:72px;text-align:right;font-weight:600;color:#1e293b;flex-shrink:0;font-size:10.5px}

/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{background:#1B3D6E;color:#fff;font-size:9.5px;text-transform:uppercase;letter-spacing:.3px;padding:9px 10px;text-align:right;position:sticky;top:0;z-index:2}
.tbl th.l{text-align:left}.tbl td.l{text-align:left}.tbl td.b{font-weight:700}
.tbl td{padding:7px 10px;border-bottom:1px solid #f1f5f9;text-align:right}
.tbl tr.a{background:#f8fafc}
.tbl tr:hover{background:#eff6ff}
.tbl tr.t{background:#1B3D6E;color:#fff;font-weight:700}.tbl tr.t td{border:none}
.tbl .dm{color:#94a3b8}
.st{max-height:520px;overflow-y:auto;border-radius:0 0 10px 10px}

/* RAG */
.rg{display:inline-block;padding:2px 9px;border-radius:10px;font-size:9.5px;font-weight:700}
.rg-r{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.rg-a{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa}
.rg-y{background:#fefce8;color:#854d0e;border:1px solid #fef08a}
.rg-g{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}

/* RAG Items */
.ri{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;border-left:4px solid;margin-bottom:8px}
.rd{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.rt{font-size:11.5px;font-weight:700}.rs{font-size:10px;margin-top:1px}

/* Insight */
.ib{border-radius:0 8px 8px 0;padding:11px 15px;margin-top:12px;margin-bottom:8px}
.ib.bl{background:#e0f2fe;border-left:4px solid #0284c7}
.ib.rd{background:#fef2f2;border-left:4px solid #dc2626}
.ib.am{background:#fff7ed;border-left:4px solid #d97706}
.ibh{font-size:11.5px;font-weight:700;margin-bottom:4px}
.ibt{font-size:11px;line-height:1.7}

.mh{background:#f8fafc;padding:16px 22px;border-bottom:2px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:5}

.mtbl tr.t{background:#1B3D6E;color:#fff;font-weight:700}.mtbl tr.t td{border:none}

@media print{.sb,.hb,.fb{display:none!important}.mn{margin-left:0}.pg{display:block!important;page-break-after:always}th,.t{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style>
</head>

// Helpers
function $(id){return document.getElementById(id)}
function fm(n){return n?'$'+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','):'$0.00'}
function fs(n){return n?'$'+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','):'$0.00'}
function pc(n,d){return d?(n/d*100).toFixed(1)+'%':'0.0%'}
function pn(n,d){return d?n/d*100:0}

// Populate company filter
const comps=[...new Set(D.map(d=>d.company))].sort();
const fSel=$('fC');
comps.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;fSel.appendChild(o)});

// Filter
function getF(){
 let r=[...D];
 const c=$('fC').value,cl=$('fCl').value.toLowerCase(),mn=+$('fMin').value;
 if(c)r=r.filter(d=>d.company===c);
 if(cl)r=r.filter(d=>d.client.toLowerCase().includes(cl));
 if(mn)r=r.filter(d=>d.balance>=mn);
 // Update tag
 let tag='Showing: ';
 if(!c&&!cl&&!mn)tag+='All Data ('+D.length+' clients)';
 else{
  if(c)tag+=c;else tag+='All Companies';
  if(cl)tag+=' | "'+$('fCl').value+'"';
  if(mn)tag+=' | $'+mn.toLocaleString()+'+';
  tag+=' ('+r.length+' clients)';
 }
 $('fTag').textContent=tag;
 return r;
}
function resetF(){$('fC').value='';$('fCl').value='';$('fMin').value='0';refresh()}

// Totals
function tot(data){
 const t={balance:0,future:0,d0_30:0,d31_60:0,d61_90:0,d91_120:0,d121:0,count:data.length};
 data.forEach(d=>{for(const k in t)if(k!=='count')t[k]+=d[k]||0});
 t.overdue=t.d61_90+t.d91_120+t.d121;
 t.companies=new Set(data.map(d=>d.company)).size;
 return t;
}

// Company aggregation
function byComp(data){
 const m={};
 data.forEach(d=>{
  if(!m[d.company])m[d.company]={balance:0,future:0,d0_30:0,d31_60:0,d61_90:0,d91_120:0,d121:0,count:0,ov_clients:0};
  const c=m[d.company];
  ['balance','future','d0_30','d31_60','d61_90','d91_120','d121'].forEach(k=>c[k]+=d[k]||0);
  c.count++;
  if(d.d61_90>0||d.d91_120>0||d.d121>0)c.ov_clients++;
 });
 return Object.entries(m).sort((a,b)=>b[1].balance-a[1].balance);
}

// Bars builder
function bars(items,color,maxV){
 if(!maxV)maxV=items[0]?.[1]||1;
 return items.map(([lbl,val,pctTxt])=>{
  const w=val/maxV*100;
  const sn=lbl.length>26?lbl.slice(0,26)+'...':lbl;
  return `<div class="br"><div class="bl" title="${lbl}">${sn}</div><div class="bt"><div class="bf" style="width:${w.toFixed(0)}%;background:${color}">${pctTxt||''}</div></div><div class="bv">${fs(val)}</div></div>`;
 }).join('');
}

// KPI card builder
function kpi(cls,label,value,sub,drillKey){
 return `<div class="kp ${cls}" onclick="drill('${drillKey}')"><div class="kl">${label}</div><div class="kv ${cls==='g'?'pos':cls==='r'?'neg':cls==='a'?'amb':cls==='dr'?'drc':''}">${value}</div><div class="ks">${sub}</div></div>`;
}

// Table row
function tr(cells,cls){
 return `<tr class="${cls||''}">${cells.map((c,i)=>`<td${i<2?' class="l"':''}${c.b?' class="b"':''}${c.s?' style="'+c.s+'"':''}>${c.v}</td>`).join('')}</tr>`;
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')cM()});

// Drill function — builds modal content dynamically from current filtered data
function drill(key){
 const data=getF();
 const t=tot(data);
 let h='';

 if(key.startsWith('period_')){
  const pk=key.replace('period_','');
  const label={future:'Future Remit',d0_30:'0-30 Days',d31_60:'31-60 Days',d61_90:'61-90 Days',d91_120:'91-120 Days',d121:'Over 121 Days'}[pk];
  const color={future:'#3b82f6',d0_30:'#16a34a',d31_60:'#eab308',d61_90:'#d97706',d91_120:'#dc2626',d121:'#9b2c2c'}[pk];

    h+=`<tr class="${i%2?'a':''}"><td>${i+1}</td><td class="l dd-t" onclick="drill('client_${d.client}')">${d.client}</td><td class="b" style="color:${color}">${fm(d[key])}</td><td>${fm(d.balance)}</td><td>${pn(d[key],d.balance).toFixed(1)}%</td><td><span class="rg ${a[1]}">${a[0]}</span></td></tr>`;
   });
   h+=`<tr class="t"><td></td><td class="l">SUBTOTAL (${cc.length})</td><td>${fm(ptot)}</td><td></td><td></td><td></td></tr></tbody></table></div></div>`;
  });
 }
 // When Overall — show all companies, and for each company show client preview
 else{
  bc.forEach(([cn,cv])=>{
   const compClients=data.filter(d=>d.company===cn).sort((a,b)=>b.balance-a.balance);
   const ov=cv.d61_90+cv.d91_120+cv.d121;
   h+=`<div class="cd"><div class="ch"><span class="dd-t" onclick="$('fC').value='${cn}';refresh();nav('company',document.querySelectorAll('.ni')[6])">${cn}</span> — ${cv.count} clients | AR: ${fs(cv.balance)}${ov>0?' | <span style=color:#dc2626>Overdue: '+fs(ov)+'</span>':''}<span class="dd" onclick="drill('comp_${cn}')">Full Detail →</span></div>`;
   h+=`<div class="st" style="max-height:220px"><table class="tbl"><thead><tr><th>#</th><th class="l">Client</th><th>Balance</th><th>Future</th><th>0-30</th><th>31-60</th><th>61-90</th><th>91-120</th><th>121+</th></tr></thead><tbody>`;
   compClients.slice(0,10).forEach((d,i)=>{
    h+=`<tr class="${i%2?'a':''}"><td>${i+1}</td><td class="l dd-t" onclick="drill('client_${d.client}')">${d.client}</td><td class="b">${fm(d.balance)}</td><td>${d.future?fm(d.future):'<span class="dm">—</span>'}</td><td>${d.d0_30?fm(d.d0_30):'<span class="dm">—</span>'}</td><td>${d.d31_60?fm(d.d31_60):'<span class="dm">—</span>'}</td><td${d.d61_90>0?' style="color:#d97706;font-weight:600"':''}>${d.d61_90?fm(d.d61_90):'<span class="dm">—</span>'}</td><td${d.d91_120>0?' style="color:#dc2626;font-weight:600"':''}>${d.d91_120?fm(d.d91_120):'<span class="dm">—</span>'}</td><td${d.d121>0?' style="color:#9b2c2c;font-weight:600"':''}>${d.d121?fm(d.d121):'<span class="dm">—</span>'}</td></tr>`;
   });
   if(compClients.length>10)h+=`<tr><td colspan="9" class="dd-t" onclick="$('fC').value='${cn}';refresh();nav('company',document.querySelectorAll('.ni')[6])" style="text-align:center;color:#0369a1;font-size:10px">View all ${compClients.length} clients →</td></tr>`;
   h+=`</tbody></table></div></div>`;
  });
 }

 $('pg-company').innerHTML=h;
}

function renderInsights(){
 const data=getF(),t=tot(data);
 const oc=data.filter(d=>(d.d61_90+d.d91_120+d.d121)>0);
 const otot=oc.reduce((s,d)=>s+d.d61_90+d.d91_120+d.d121,0);
 const top10=oc.map(d=>({...d,ov:d.d61_90+d.d91_120+d.d121})).sort((a,b)=>b.ov-a.ov).slice(0,10);
 const t10s=top10.reduce((s,d)=>s+d.ov,0);
 const bc=byComp(data).sort((a,b)=>(b[1].d61_90+b[1].d91_120+b[1].d121)-(a[1].d61_90+a[1].d91_120+a[1].d121));
 const topComp=bc[0];const topOv=topComp?(topComp[1].d61_90+topComp[1].d91_120+topComp[1].d121):0;
 const t15=data.sort((a,b)=>b.balance-a.balance).slice(0,15);const tb=t15.reduce((s,d)=>s+d.balance,0);

 let h=`<div class="ph">Insights & Recommended Actions</div><div class="ps">Data-driven collection strategy</div>`;
 h+=`<div class="tc"><div class="cd"><div class="ch">Key Findings</div>`;
 const findings=[
  ['#dc2626','#fef2f2',`Overdue: ${pc(t.overdue,t.balance)} of AR`,`${fs(t.overdue)} across ${oc.length} clients exceeds 60 days`],
  ['#9b2c2c','#fef2f2',`121+ is largest bucket at ${fs(t.d121)}`,`${pc(t.d121,t.balance)} of total AR — highest provisioning risk`],
  ['#d97706','#fff7ed',`${topComp?topComp[0]:'Top company'} holds ${pc(topOv,otot)} of overdue`,`Single subsidiary concentration creates material risk`],
  ['#eab308','#fefce8',`Top 10 = ${pc(t10s,otot)} of all overdue`,`Focused collection on 10 accounts recovers ${fs(t10s)}`],
  ['#16a34a','#f0fdf4',`Top 15 = ${pc(tb,t.balance)} of AR`,`Relationship management for these accounts is critical`]
 ];
 findings.forEach(([c,bg,title,sub])=>{h+=`<div class="ri" style="background:${bg};border-left-color:${c}"><div class="rd" style="background:${c}"></div><div><div class="rt" style="color:${c}">${title}</div><div class="rs" style="color:${c}">${sub}</div></div></div>`});
 h+=`</div><div class="cd"><div class="ch">Recommended Actions</div>`;
 h+=`<div class="ib rd" style="margin-bottom:10px"><div class="ibh" style="color:#991b1b">CRITICAL — Immediate</div><div class="ibt" style="color:#7f1d1d">1. Escalate ${data.filter(d=>d.d121>100000).length} clients >$100K in 121+. 2. Suspend credit for 121+ clients (${data.filter(d=>d.d121>0).length} accounts). 3. Formal demand letters to top 10 overdue.</div></div>`;
 h+=`<div class="ib am" style="margin-bottom:10px"><div class="ibh" style="color:#9a3412">HIGH — Next 2 Weeks</div><div class="ibt" style="color:#92400e">1. Dedicated collectors for 91-120 day clients (${data.filter(d=>d.d91_120>0).length} accounts, ${fs(t.d91_120)}). 2. Payment plans for >$50K. 3. Credit holds on new orders. 4. Executive calls with top 5 overdue companies.</div></div>`;
 h+=`<div class="ib bl"><div class="ibh" style="color:#0c4a6e">MODERATE — Ongoing</div><div class="ibt" style="color:#1e3a5f">1. Weekly follow-up for 61-90 day clients (${data.filter(d=>d.d61_90>0).length} accounts). 2. Monthly review for Top 15. 3. Quarterly provision review. 4. Auto reminders at 45 & 60 days.</div></div>`;
 h+=`</div></div>`;
 $('pg-insights').innerHTML=h;
}

// ══════════════════════════════════════════════
// NAVIGATION & REFRESH
// ══════════════════════════════════════════════
const titles={overview:'Overview',collection:'Collection Priority',top15:'Top 15 Receivables',pfut:'Future Remit',p030:'0–30 Days',p3160:'31–60 Days',p61:'61–90 Days',p91:'91–120 Days',p121:'Over 121 Days',company:'By Company',insights:'Insights & Actions'};

function nav(pg,el){
 document.querySelectorAll('.pg').forEach(p=>p.classList.remove('ac'));
 $('pg-'+pg).classList.add('ac');
 document.querySelectorAll('.ni').forEach(n=>n.classList.remove('ac'));
 if(el)el.classList.add('ac');
 $('pt').textContent=titles[pg]||pg;
 $('sb').classList.remove('mo-o');
 window.scrollTo(0,0);
 refresh();
}

function refresh(){
 renderOverview();
 renderCollection();
 renderTop15();
 renderPeriod('pg-pfut','future','Future Remit','#3b82f6','b','Scheduled future remittances');
 renderPeriod('pg-p030','d0_30','0–30 Days','#16a34a','g','Current period — within normal terms');
 renderPeriod('pg-p3160','d31_60','31–60 Days','#eab308','a','Approaching overdue threshold');
 renderPeriod('pg-p61','d61_90','61–90 Days','#d97706','a','Action required — escalation window');
 renderPeriod('pg-p91','d91_120','91–120 Days','#dc2626','r','High risk — approaching bad debt');
 renderPeriod('pg-p121','d121','Over 121 Days','#9b2c2c','dr','Critical — potential write-off');
 renderCompany();
 renderInsights();
}

// Init
refresh();
</script>
